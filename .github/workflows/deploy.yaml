name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-slim
    outputs:
      skip-deploy: ${{ steps.check_hash.outputs.is-dirty == 'false' }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Build and upload artifacts
        uses: withastro/action@b7d53628f8b666036b0238aadb0b984a2a489f26 # v6.1.1
        with:
          node-version: 24
          package-manager: pnpm@10
      - name: Check hash
        id: check_hash
        uses: ./.github/actions/check-dist-manifest
        with:
          update-cache: true

  deploy:
    needs: build
    if: needs.build.outputs.skip-deploy == 'false'
    runs-on: ubuntu-slim
    permissions:
      # ref: https://github.com/actions/deploy-pages#security-considerations
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
